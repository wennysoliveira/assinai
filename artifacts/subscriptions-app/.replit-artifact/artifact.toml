kind = "web"
previewPath = "/"
title = "Gestão de Assinaturas"
version = "1.0.0"
id = "artifacts/subscriptions-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19664

[services.development]
run = "pnpm --filter @workspace/subscriptions-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/subscriptions-app", "run", "build" ]
publicDir = "artifacts/subscriptions-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19664"
BASE_PATH = "/"
